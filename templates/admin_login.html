<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · Manish</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0d15;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .login-box {
            background: #161b2b;
            padding: 40px 35px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .login-box h1 {
            color: #e8edf5;
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-box .sub {
            color: #8b95b0;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .login-box label {
            color: #8b95b0;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #0b0d15;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            color: #e8edf5;
            font-size: 1rem;
            margin-bottom: 18px;
            transition: border-color 0.3s;
        }
        .login-box input:focus {
            outline: none;
            border-color: #00f0c0;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #00f0c0;
            color: #0b0d15;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        .login-box button:hover {
            background: #5affd0;
            transform: scale(1.02);
        }
        .error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: -8px;
            margin-bottom: 12px;
            text-align: center;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #5a657a;
            font-size: 0.8rem;
        }
        .back-link a {
            color: #00f0c0;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 Admin</h1>
        <p class="sub">Enter your credentials</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Log In</button>
        </form>
        <div class="back-link"><a href="/">← Back to Portfolio</a></div>
    </div>
</body>
</html>
